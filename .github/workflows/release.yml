# IMPORTANT: DO NOT RENAME THIS FILE
# It uses Trusted Publisher to deploy without token
# https://www.npmjs.com/package/ai-retry/access

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write # needed for npm publish with provenance
  contents: write # needed to force-move the major version tag (vMAJOR.x)

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      # http://github.com/actions/checkout
      - uses: actions/checkout@v5
      # https://github.com/pnpm/action-setup
      - uses: pnpm/action-setup@v4
      # https://github.com/actions/setup-node
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm build
      - run: pnpm test
      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            # Prerelease: publish under a dist-tag named after the channel,
            # e.g. 2.0.0-next.3 -> next. Keeps `latest` on the stable line.
            CHANNEL="${VERSION#*-}"
            CHANNEL="${CHANNEL%%.*}"
            echo "Publishing prerelease $VERSION under dist-tag: $CHANNEL"
            pnpm publish --provenance --no-git-checks --tag "$CHANNEL"
          else
            echo "Publishing stable version: $VERSION"
            pnpm publish --provenance --no-git-checks
          fi

      # Force-move the floating major tag (e.g. v2.x) to the released commit so
      # links like /tree/v2.x always resolve to the latest release in that major
      # line. Skipped for prereleases (so an -rc/-next never yanks the stable
      # vX.x tag) and for manual workflow_dispatch runs (no release payload).
      # Uses the default GITHUB_TOKEN: the repo has no tag protection, and its
      # pushes don't re-trigger workflows.
      - name: Update major version tag
        if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
        env:
          TAG: ${{ github.event.release.tag_name }} # e.g. v2.12.0
        run: |
          major="${TAG%%.*}"               # v2.12.0 -> v2
          git tag -f "${major}.x"          # tag the checked-out release commit -> v2.x
          git push -f origin "${major}.x"
