name: CI

on:
  push:
    branches:
      - main
      - ai-sdk-v7
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: write # needed for checks
  id-token: write # needed for npm publish with provenance
  contents: write # needed for github release
  pull-requests: write # needed for coverage comment

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'
      - name: Install
        run: pnpm install
      - name: Lint
        run: pnpm lint:ci

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'
      - name: Install
        run: pnpm install
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm test
      - name: Type Check
        run: pnpm typecheck

  preview:
    name: Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'
      - name: Install
        run: pnpm install
      - name: Build
        run: pnpm build
      - name: Publish Preview
        run: npx pkg-pr-new publish --pnpm --packageManager=pnpm

  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      release_created: ${{ steps.release.outputs.release_created }}
      id: ${{ steps.release.outputs.id }}
      name: ${{ steps.release.outputs.name }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
      body: ${{ steps.release.outputs.body }}
      html_url: ${{ steps.release.outputs.html_url }}
      draft: ${{ steps.release.outputs.draft }}
      upload_url: ${{ steps.release.outputs.upload_url }}
      path: ${{ steps.release.outputs.path }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      prs_created: ${{ steps.release.outputs.prs_created }}
    steps:
      # https://github.com/googleapis/release-please-action
      - name: Release Please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          # https://github.com/googleapis/release-please-action?tab=readme-ov-file#github-credentials
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Output Release Information
        run: |
          {
            echo "releases_created=${{ steps.release.outputs.releases_created }}"
            echo "release_created=${{ steps.release.outputs.release_created }}"
            echo "id=${{ steps.release.outputs.id }}"
            echo "name=${{ steps.release.outputs.name }}"
            echo "tag_name=${{ steps.release.outputs.tag_name }}"
            echo "sha=${{ steps.release.outputs.sha }}"
            echo "body<<EOF"
            echo "${{ steps.release.outputs.body }}"
            echo "EOF"
            echo "html_url=${{ steps.release.outputs.html_url }}"
            echo "draft=${{ steps.release.outputs.draft }}"
            echo "upload_url=${{ steps.release.outputs.upload_url }}"
            echo "path=${{ steps.release.outputs.path }}"
            echo "version=${{ steps.release.outputs.version }}"
            echo "major=${{ steps.release.outputs.major }}"
            echo "minor=${{ steps.release.outputs.minor }}"
            echo "patch=${{ steps.release.outputs.patch }}"
            echo "paths_released=${{ steps.release.outputs.paths_released }}"
            echo "prs_created=${{ steps.release.outputs.prs_created }}"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Print Release Details
        env:
          RELEASE: ${{ toJSON(steps.release.outputs) }}
        run: echo "$RELEASE"

  # Prerelease (beta) line for the next major, cut from the `ai-sdk-v7` branch.
  # Isolated from the stable release above: it uses its OWN config and manifest
  # (*.beta.json) so the `ai-sdk-v7` branch never touches main's release-please
  # files. Auto-merges the release PR so every push to this branch cuts a new
  # beta (tag + GitHub Release flagged prerelease), which release.yml then
  # publishes under the `beta` dist-tag. Delete this job and the *.beta.json
  # files when this branch merges into `main`.
  release-beta:
    name: Release Beta
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/ai-sdk-v7'
    steps:
      # https://github.com/googleapis/release-please-action
      - name: Release Please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          # https://github.com/googleapis/release-please-action?tab=readme-ov-file#github-credentials
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: ai-sdk-v7
          config-file: release-please-config.beta.json
          manifest-file: .release-please-manifest.beta.json

      # Gated: GitHub auto-merge waits for the branch's required status checks
      # before merging. Once merged, release-please tags + creates the GitHub
      # release, which triggers the publish workflow.
      - name: Enable auto-merge on the beta release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: gh pr merge --squash --auto -R "${{ github.repository }}" "${{ fromJSON(steps.release.outputs.pr).number }}"
